name: Sync Drive media

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-drive
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg and rclone
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg rclone

      - name: Write service account key
        run: printf '%s' "$GDRIVE_SA_KEY" > "$RUNNER_TEMP/sa.json"
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}

      - name: Pull clips from the Drive folder
        run: |
          mkdir -p "$RUNNER_TEMP/incoming"
          rclone copy \
            --drive-service-account-file "$RUNNER_TEMP/sa.json" \
            --drive-root-folder-id "${{ vars.GDRIVE_FOLDER_ID }}" \
            --drive-acknowledge-abuse \
            --include "*.{mov,MOV,mp4,MP4,m4v,M4V}" \
            ":drive:" "$RUNNER_TEMP/incoming"

      - name: Convert to MP4 with no quality loss
        run: |
          shopt -s nullglob
          for f in "$RUNNER_TEMP"/incoming/*.[mM][oO][vV] "$RUNNER_TEMP"/incoming/*.[mM]4[vV]; do
            [ -e "$f" ] || continue
            name="$(basename "${f%.*}")"
            ffmpeg -y -i "$f" -c copy -movflags +faststart "${name}.mp4"
          done
          for f in "$RUNNER_TEMP"/incoming/*.[mM][pP]4; do
            [ -e "$f" ] || continue
            cp -n "$f" "./$(basename "$f")"
          done

      - name: Commit and push new media
        run: |
          git config user.name "BeeBigger Bot"
          git config user.email "info@beebigger.com"
          git add -- '*.mp4'
          if git diff --staged --quiet; then
            echo "No new media to commit."
          else
            git commit -m "sync: drive media $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
